server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve frontend static files.
    # no-cache ≠ no-store: browsers may keep a copy but MUST revalidate
    # (ETag/If-None-Match) before using it. Without this, heuristic caching
    # can mix old and new JS modules across deploys (e.g. a fresh app.js
    # calling a function that doesn't exist in a stale cached api.js).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Plan-markup rasters (A0/A1 PDFs rendered at high DPI) can be tens of
        # MB; the backend enforces its own 60 MB cap.
        client_max_body_size 60m;
        client_body_buffer_size 1m;
    }
}
