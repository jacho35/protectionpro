services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protectionpro-backend
    environment:
      - DATABASE_URL=sqlite:////data/protectionpro.db
    volumes:
      - db-data:/data
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/projects')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: protectionpro-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
